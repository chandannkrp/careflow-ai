spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:../.env[.properties]
  application:
    name: careflow-ai
  autoconfigure:
    # JWT auth uses staff_user + bcrypt, not UserDetailsService; this stops Spring
    # from generating (and logging) an unused default user password at startup.
    exclude: org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration
  ai:
    openai-sdk:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: ${OPENAI_MODEL:gpt-5-mini}
      embedding:
        options:
          model: ${OPENAI_EMBEDDING_MODEL:text-embedding-3-small}
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
    username: ${DATABASE_USER}
    password: ${DATABASE_PASSWORD}
    
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  jackson:
    mapper:
      accept-case-insensitive-enums: true

server:
  port: ${PORT}
  error:
    include-message: always

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  # Hackathon/demo: set CORS_ALLOW_ALL=true (or CORS_ALLOWED_ORIGINS=*) so any frontend URL works.
  allow-all: ${CORS_ALLOW_ALL:false}

auth:
  jwt-secret: ${JWT_SECRET:careflow-dev-only-secret-change-me-in-production}
  token-ttl-minutes: ${JWT_TTL_MINUTES:720}
  default-staff-password: ${DEFAULT_STAFF_PASSWORD:careflow}

openai:
  enabled: ${OPENAI_ENABLED}
  api-key: ${OPENAI_API_KEY}
  model: ${OPENAI_MODEL}

ai-service:
  url: ${AI_SERVICE_URL:}

research:
  # Optional NCBI E-utilities key: raises the PubMed rate limit from 3 to 10 req/s.
  ncbi-api-key: ${NCBI_API_KEY:}
